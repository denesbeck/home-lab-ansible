---
- name: Set up NGINX with SSL (Let's Encrypt via Cloudflare DNS)
  hosts: all
  become: true

  vars_files:
    - ../vars/certbot.yml

  vars:
    certbot_domain: arcade-lab.io
    certbot_email: "{{ cloudflare_email }}"
    certbot_credentials_path: /root/.secrets/cloudflare.ini

  tasks:
    - name: Install NGINX
      package:
        name: nginx
        state: present

    - name: Install certbot and Cloudflare DNS plugin
      apt:
        name:
          - certbot
          - python3-certbot-dns-cloudflare
        state: present
        update_cache: yes

    - name: Create secrets directory
      file:
        path: /root/.secrets
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Deploy Cloudflare API credentials
      template:
        src: ../config/cloudflare.ini.j2
        dest: "{{ certbot_credentials_path }}"
        owner: root
        group: root
        mode: '0600'

    - name: Check if Let's Encrypt certificate exists
      stat:
        path: "/etc/letsencrypt/live/{{ certbot_domain }}/fullchain.pem"
      register: letsencrypt_cert

    - name: Obtain Let's Encrypt wildcard certificate via Cloudflare DNS
      command: >
        certbot certonly
        --dns-cloudflare
        --dns-cloudflare-credentials {{ certbot_credentials_path }}
        --dns-cloudflare-propagation-seconds 30
        -d {{ certbot_domain }}
        -d '*.{{ certbot_domain }}'
        --email {{ certbot_email }}
        --agree-tos
        --non-interactive
      when: not letsencrypt_cert.stat.exists

    - name: Check if DH parameters exist
      stat:
        path: /etc/ssl/certs/dhparam.pem
      register: dhparam_exists

    - name: Create Diffie-Hellman group
      command: openssl dhparam -out /etc/ssl/certs/dhparam.pem 2048
      when: not dhparam_exists.stat.exists

    - name: Set proper permissions on DH parameters
      file:
        path: /etc/ssl/certs/dhparam.pem
        owner: root
        group: root
        mode: '0644'
      when: dhparam_exists.stat.exists or not dhparam_exists.stat.exists

    - name: Set up certbot auto-renewal with NGINX reload
      cron:
        name: "certbot-renew"
        minute: "30"
        hour: "2"
        weekday: "1"
        job: "certbot renew --quiet --deploy-hook 'systemctl reload nginx'"
        user: root

    - name: Remove default NGINX site config
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Add custom NGINX config for Docker
      template:
        src: ../config/nginx.conf.j2
        dest: /etc/nginx/sites-enabled/docker.conf

    - name: Restart NGINX service
      service:
        name: nginx
        state: restarted
        enabled: yes
