---
- name: Setup UPS power monitor
  hosts: all
  become: true

  vars_files:
    - ../vars/ups-monitor.yml

  vars:
    power_monitor_script_dest: /usr/local/bin/power-monitor.sh
    power_monitor_log: /var/log/power-monitor.log
    power_monitor_metrics_dir: /var/lib/node-exporter/textfile
    power_monitor_metrics_file: /var/lib/node-exporter/textfile/power_monitor.prom
    ping_interval: 30
    max_failures: 10

  tasks:
    - name: Ensure textfile collector directory exists
      file:
        path: "{{ power_monitor_metrics_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy power monitor script
      copy:
        dest: "{{ power_monitor_script_dest }}"
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/bash

          # Power monitor script for UPS-protected server
          # Pings the router every {{ ping_interval }} seconds. After {{ max_failures }} consecutive
          # failed attempts, initiates a graceful shutdown (indicates
          # power outage — router is off, server is running on UPS).

          set -euo pipefail

          ROUTER_IP="{{ router_ip }}"
          PING_INTERVAL={{ ping_interval }}
          MAX_FAILURES={{ max_failures }}
          LOG_FILE="{{ power_monitor_log }}"
          METRICS_FILE="{{ power_monitor_metrics_file }}"

          log_message() {
              echo "$(date '+%Y-%m-%d %H:%M:%S') - $1" | tee -a "$LOG_FILE"
          }

          write_metrics() {
              local ping_ok=$1
              local fails=$2
              local latency=$3
              printf '%s\n' \
                "# HELP power_monitor_router_reachable Whether the router is reachable (1 = yes, 0 = no)." \
                "# TYPE power_monitor_router_reachable gauge" \
                "power_monitor_router_reachable ${ping_ok}" \
                "# HELP power_monitor_consecutive_failures Current number of consecutive ping failures." \
                "# TYPE power_monitor_consecutive_failures gauge" \
                "power_monitor_consecutive_failures ${fails}" \
                "# HELP power_monitor_max_failures Failure threshold before shutdown is triggered." \
                "# TYPE power_monitor_max_failures gauge" \
                "power_monitor_max_failures ${MAX_FAILURES}" \
                "# HELP power_monitor_ping_latency_ms Round-trip ping latency in milliseconds (0 if unreachable)." \
                "# TYPE power_monitor_ping_latency_ms gauge" \
                "power_monitor_ping_latency_ms ${latency}" \
                > "${METRICS_FILE}.tmp"
              mv "${METRICS_FILE}.tmp" "${METRICS_FILE}"
          }

          fail_count=0

          while true; do
              ping_output=$(ping -c 1 -W 5 "$ROUTER_IP" 2>&1) && ping_success=true || ping_success=false

              if [ "$ping_success" = true ]; then
                  latency=$(echo "$ping_output" | sed -n 's/.*time=\([0-9.]*\).*/\1/p')
                  latency=${latency:-0}
                  if [ "$fail_count" -gt 0 ]; then
                      log_message "Router reachable again. Resetting fail counter (was $fail_count)."
                      fail_count=0
                  fi
                  write_metrics 1 0 "$latency"
              else
                  fail_count=$((fail_count + 1))
                  log_message "Ping to $ROUTER_IP failed ($fail_count/$MAX_FAILURES)."
                  write_metrics 0 "$fail_count" 0

                  if [ "$fail_count" -ge "$MAX_FAILURES" ]; then
                      log_message "CRITICAL: $MAX_FAILURES consecutive ping failures. Initiating shutdown."
                      /sbin/shutdown -h now "Power monitor: router unreachable, assuming power outage."
                      exit 0
                  fi
              fi

              sleep "$PING_INTERVAL"
          done

    - name: Create log file with proper permissions
      file:
        path: "{{ power_monitor_log }}"
        state: touch
        owner: root
        group: root
        mode: "0644"

    - name: Setup power monitor cronjob at reboot
      cron:
        name: "UPS power monitor"
        special_time: reboot
        job: "{{ power_monitor_script_dest }} >> {{ power_monitor_log }} 2>&1"
        state: present

    - name: Display power monitor configuration
      debug:
        msg:
          - "Power monitor script deployed to: {{ power_monitor_script_dest }}"
          - "Router IP: {{ router_ip }}"
          - "Ping interval: {{ ping_interval }} seconds"
          - "Failure threshold: {{ max_failures }} consecutive failures"
          - "Action on threshold: graceful shutdown"
          - "Cronjob: runs at every reboot"
          - "Log file: {{ power_monitor_log }}"
          - "Metrics file: {{ power_monitor_metrics_file }}"
