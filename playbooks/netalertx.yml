---
- name: Set up NetAlertX container
  hosts: all
  become: true
  vars_files:
    - ../vars/netalertx.yml

  tasks:
    - name: Create necessary directories for NetAlertX container
      file:
        path: "{{ item }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        state: directory
        mode: "0755"
        recurse: yes
      loop:
        - "{{ netalertx_data_path }}/config"
        - "{{ netalertx_data_path }}/db"

    - name: Gather user ID (PUID)
      command: "id -u {{ ansible_user }}"
      register: user_id
      changed_when: false

    - name: Gather group ID (PGID)
      command: "id -g {{ ansible_user }}"
      register: group_id
      changed_when: false

    - name: Set ARP flux sysctls on the host
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: yes
        state: present
        reload: yes
      loop:
        - { name: net.ipv4.conf.all.arp_ignore, value: "1" }
        - { name: net.ipv4.conf.all.arp_announce, value: "2" }

    - name: Ensure NetAlertX container is running
      docker_container:
        name: "{{ netalertx_container_name }}"
        image: "{{ netalertx_image }}"
        state: started
        restart_policy: unless-stopped
        network_mode: host
        read_only: true
        capabilities:
          - NET_ADMIN
          - NET_RAW
          - NET_BIND_SERVICE
          - CHOWN
          - SETUID
          - SETGID
        env:
          PORT: "{{ netalertx_port | string }}"
          LISTEN_ADDR: "127.0.0.1"
          TZ: "{{ netalertx_timezone }}"
          PUID: "{{ user_id.stdout }}"
          PGID: "{{ group_id.stdout }}"
        volumes:
          - "{{ netalertx_data_path }}:/data:rw"
          - "/etc/localtime:/etc/localtime:ro"
        tmpfs:
          - "/tmp:uid={{ user_id.stdout }},gid={{ group_id.stdout }},mode=1700,rw,nosuid,nodev"
        memory: "2048m"
        memory_reservation: "1024m"
        cpu_shares: 512
        pids_limit: 512
        log_driver: json-file
        log_options:
          max-size: "10m"
          max-file: "3"
      register: netalertx_container

    - name: Check if the NetAlertX container is running
      debug:
        msg: "NetAlertX container is running with name: {{ netalertx_container_name }}"
      when: netalertx_container.changed
