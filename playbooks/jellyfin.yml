---
- name: Set up Jellyfin
  hosts: all
  become: true

  vars_files:
    - ../vars/jellyfin.yml

  tasks:
    - name: Check if Docker is installed
      command: docker --version
      register: docker_version
      failed_when: docker_version.rc != 0
      changed_when: false

    - name: Create necessary directories for Jellyfin container
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
        recurse: yes
      loop:
        - "{{ jellyfin_config_path }}"
        - "{{ jellyfin_cache_path }}"

    - name: Ensure Jellyfin container is running
      docker_container:
        name: jellyfin
        image: jellyfin/jellyfin
        state: started
        restart_policy: unless-stopped
        memory: "{{ jellyfin_memory_limit }}"
        memory_swap: "{{ jellyfin_memory_limit }}"
        cpus: "{{ jellyfin_cpu_limit }}"
        published_ports:
          - "127.0.0.1:8096:8096"
        env:
          TZ: "{{ jellyfin_timezone }}"
        volumes:
          - "{{ jellyfin_config_path }}:/config"
          - "{{ jellyfin_cache_path }}:/cache"
          - "{{ jellyfin_movies_path }}:/media:ro"
      register: jellyfin_container

    - name: Check if the Jellyfin container is running
      debug:
        msg: "Jellyfin container is running"
      when: jellyfin_container.changed
